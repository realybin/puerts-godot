name: Continuous Integration

on:
  workflow_call:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
  merge_group:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup clang-format
        shell: bash
        run: |
          python -m pip install "clang-format==21.1.0"
          clang-format --version

      - name: Run clang-format
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            mapfile -t files < <(rg --files src -g '*.h' -g '*.hpp' -g '*.c' -g '*.cc' -g '*.cpp')
          else
            mapfile -t files < <(find src -type f \( -name '*.h' -o -name '*.hpp' -o -name '*.c' -o -name '*.cc' -o -name '*.cpp' \))
          fi
          ((${#files[@]})) || { echo "No C/C++ files found under src"; exit 0; }
          clang-format -style=file --dry-run --Werror "${files[@]}"

  build:
    name: build and test (${{ matrix.target.platform }}, ${{ matrix.target.arch }}, ${{ matrix.target.os }}, ${{ matrix.target_type }}, ${{ matrix.float_precision }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
#          - target: { platform: windows, arch: x86_64, os: windows-2022 }
#            target_type: template_debug
#            float_precision: single
#          - target: { platform: macos, arch: arm64, os: macos-14 }
#            target_type: template_debug
#            float_precision: single
          - target: { platform: linux, arch: x86_64, os: ubuntu-22.04 }
            target_type: template_debug
            float_precision: single
#          - target: { platform: android, arch: arm64, os: ubuntu-22.04 }
#            target_type: template_debug
#            float_precision: single
#          - target: { platform: ios, arch: arm64, os: macos-15 }
#            target_type: template_debug
#            float_precision: single
#          - target: { platform: web, arch: wasm32, os: ubuntu-22.04 }
#            target_type: template_release
#            float_precision: double

    uses: ./.github/workflows/build_target.yml
    secrets: inherit
    with:
      runner: ${{ matrix.target.os }}
      platform: ${{ matrix.target.platform }}
      arch: ${{ matrix.target.arch }}
      target_type: ${{ matrix.target_type }}
      float_precision: ${{ matrix.float_precision }}
      api_version: "4.7"
      godot_version: "4.7.0"
      run_tests: true
      save_cache: ${{ github.event_name == 'push' }}
