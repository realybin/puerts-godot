name: Build Godot Type Declarations

on:
  workflow_dispatch:
    inputs:
      build_godot_4_5: { description: "Godot 4.5", type: boolean, required: false, default: false }
      build_godot_4_6: { description: "Godot 4.6", type: boolean, required: false, default: false }
      build_godot_4_7: { description: "Godot 4.7", type: boolean, required: false, default: true }
      include_documentation:
        description: "Include Godot API documentation as JSDoc"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      godot_versions: ${{ steps.select.outputs.godot_versions }}
      has_godot_versions: ${{ steps.select.outputs.has_godot_versions }}
      documentation_suffix: ${{ steps.select.outputs.documentation_suffix }}
    steps:
      - id: select
        shell: bash
        env:
          BUILD_GODOT_4_5: ${{ inputs.build_godot_4_5 }}
          BUILD_GODOT_4_6: ${{ inputs.build_godot_4_6 }}
          BUILD_GODOT_4_7: ${{ inputs.build_godot_4_7 }}
          INCLUDE_DOCUMENTATION: ${{ inputs.include_documentation }}
        run: |
          set -euo pipefail

          godot_versions='[]'
          if [[ "$BUILD_GODOT_4_5" == "true" ]]; then
            godot_versions=$(jq -c '. + [{"api_version":"4.5","godot_version":"4.5.2"}]' <<<"$godot_versions")
          fi
          if [[ "$BUILD_GODOT_4_6" == "true" ]]; then
            godot_versions=$(jq -c '. + [{"api_version":"4.6","godot_version":"4.6.3"}]' <<<"$godot_versions")
          fi
          if [[ "$BUILD_GODOT_4_7" == "true" ]]; then
            godot_versions=$(jq -c '. + [{"api_version":"4.7","godot_version":"4.7.1"}]' <<<"$godot_versions")
          fi

          echo "godot_versions=$godot_versions" >> "$GITHUB_OUTPUT"
          if [[ "$godot_versions" == "[]" ]]; then
            echo "has_godot_versions=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_godot_versions=true" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$INCLUDE_DOCUMENTATION" == "true" ]]; then
            echo "documentation_suffix=with-docs" >> "$GITHUB_OUTPUT"
          else
            echo "documentation_suffix=without-docs" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Godot ${{ matrix.godot.api_version }} (${{ needs.prepare.outputs.documentation_suffix }})
    needs: prepare
    if: ${{ needs.prepare.outputs.has_godot_versions == 'true' }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        godot: ${{ fromJSON(needs.prepare.outputs.godot_versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/puerts-godot-dts-gen/package-lock.json

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ matrix.godot.godot_version }}
          use-dotnet: false
          include-templates: false

      - name: Build declaration generator
        working-directory: tools/puerts-godot-dts-gen
        run: |
          npm ci
          npm run build

      - name: Export Godot extension API
        shell: bash
        env:
          INCLUDE_DOCUMENTATION: ${{ inputs.include_documentation }}
        run: |
          set -euo pipefail
          api_directory="$RUNNER_TEMP/godot-api"
          mkdir -p "$api_directory"
          cd "$api_directory"

          if [[ "$INCLUDE_DOCUMENTATION" == "true" ]]; then
            godot --headless --dump-extension-api-with-docs
          else
            godot --headless --dump-extension-api
          fi

          test -s extension_api.json

      - name: Generate godot.d.ts
        shell: bash
        env:
          API_VERSION: ${{ matrix.godot.api_version }}
          INCLUDE_DOCUMENTATION: ${{ inputs.include_documentation }}
        run: |
          set -euo pipefail
          mkdir -p artifacts

          generator_args=(
            node tools/puerts-godot-dts-gen/dist/index.js
            --input "$RUNNER_TEMP/godot-api/extension_api.json"
            --output artifacts/godot.d.ts
            --docs-base-url "https://docs.godotengine.org/en/$API_VERSION/"
          )
          if [[ "$INCLUDE_DOCUMENTATION" != "true" ]]; then
            generator_args+=(--no-docs)
          fi

          "${generator_args[@]}"
          test -s artifacts/godot.d.ts

      - name: Upload godot.d.ts
        uses: actions/upload-artifact@v7
        with:
          name: godot-dts-${{ matrix.godot.api_version }}-${{ needs.prepare.outputs.documentation_suffix }}
          path: artifacts/godot.d.ts
          if-no-files-found: error
